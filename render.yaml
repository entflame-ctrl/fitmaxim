services:
  - type: web
    name: gym-management
    env: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma db push
    startCommand: npm start
    envVars:
      # DATABASE_URL is set manually in the Render dashboard
      # using your Neon connection string (sync: false = prompt, don't sync).
      - key: DATABASE_URL
        sync: false
      - key: NODE_ENV
        value: production
