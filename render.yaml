services:
  - type: web
    name: gym-management
    env: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gym-db
          property: connectionString
      - key: NODE_ENV
        value: production

databases:
  - name: gym-db
    plan: free
